м попала в руки таинственная записка, расшифровав которую можно найти настоящий клад! Узнать секрет записки нужно еще и потому, что она - ключ к скандальной краже, происшедшей в школе ребят. Юные сыщики отправились за разгадкой в село Чернодубово, но неожиданно в игру включились какие-то подозрительные личности. Их дела тоже связаны с этой странной историей..."},{"i":405,"t":"Дядюшка в законе","a":"Гусев В.Б.","g":"Повесть","c":"","y":"2002","e":1,"d":""},{"i":406,"t":"Под девятой сосной в чистом поле","a":"Гусев В.Б.","g":"","c":"","y":"2005","e":1,"d":""},{"i":407,"t":"Тусовка на острове Скелета","a":"Гусев В.Б.","g":"Повесть","c":"","y":"2008","e":1,"d":""},{"i":408,"t":"Что внутри растений?","a":"Гэнери А.","g":"Рассказы","c":"","y":"1994","e":1,"d":"В книге рассказывается о жизни растений, начиная с подробного описания жизни клетки и кончая рассказом о строении высших растений"},{"i":409,"t":"Чарли и шоколадная фабрика","a":"Дал Р.","g":"","c":"","y":"1991","e":1,"d":"Увлекательные приключения маленького мальчика Чарли и его друзей на волшебной кондитерской фабрике"},{"i":410,"t":"Даль В. Толковый словарь живого великорусского языка","a":"В. Даль. - 2-е изд., испр. и доп","g":"Словарь","c":"","y":"","e":1,"d":""},{"i":411,"t":"Даль В. Толковый словарь живого великорусского языка","a":"В. Даль. - 2-е изд., испр. и доп","g":"Словарь","c":"","y":"","e":1,"d":""},{"i":412,"t":"И. Даль","a":"Даль В.И.Т.В.","g":"","c":"","y":"1880","e":1,"d":""},{"i":413,"t":"И. Даль","a":"Даль В.И.Т.В.","g":"","c":"","y":"1882","e":1,"d":""},{"i":414,"t":"Пословицы и поговорки","a":"Даль В.И.","g":"","c":"","y":"2019","e":1,"d":""},{"i":415,"t":"Толковый словарь живого великорусского языка [Электронный ресурс]","a":"Даль В.И.","g":"Словарь","c":"","y":"2004","e":1,"d":""},{"i":416,"t":"Недоступное глазу","a":"Дариус Д.","g":"","c":"","y":"1986","e":1,"d":""},{"i":417,"t":"Говорящий сверток","a":"Даррелл Д.","g":"Повесть","c":"","y":"1993","e":1,"d":"Сказочная повесть всемирно известного английского ученого-зоолога и писателя. Отважные герои захватывающей истории освобождают волшебную страну Мифландию от власти злых и грубых василисков"},{"i":418,"t":"Говорящий сверток","a":"Даррелл Д.","g":"Повесть","c":"","y":"1990","e":2,"d":""},{"i":419,"t":"Деньги мира","a":"ред. М. Аксенова","g":"Энциклопедия","c":"","y":"2006","e":1,"d":""},{"i":420,"t":"За страницами учебника математики","a":"Депман И.Я.","g":"Учебник","c":"5-6","y":"1989","e":1,"d":""},{"i":421,"t":"Детская энциклопедия","a":"Джейн Эллиотт и Колин Кинг","g":"Энциклопедия","c":"","y":"1994","e":2,"d":"Эта красочная Детская энциклопедия содержит много полезных сведений и интересных фактов. Все основные понятия о предметах и явлениях даются в простой и доходчивой форме и расположены в тематическом порядке. В конце книги есть алфавитный указатель. Веселые иллюстрации Колина Кинга не только дадут ответы на множество вопросов, которые так любят задавать дети, но и доставят большое удовольствие читателям. [Аннотация издательства]"},{"i":422,"t":"Детская энциклопедия","a":"б/а","g":"Энциклопедия","c":"","y":"1995","e":1,"d":"Это рассказ о нашей Вселенной от первых ее шагов до рождения солнечной системы, где переплетаются мифы и реальность... Где с восторгом говорится о появлении и размножении первой клетки... Где с радостью сообщается о победе млекопитающих... Где повествуется о том, как через двадцать миллиардов лет на Земле наконец появился человек..."},{"i":423,"t":"Детская энциклопедия","a":"б/а","g":"Энциклопедия","c":"","y":"1995","e":1,"d":"Это происходило там, где люди обживали берега Нила, подчиняясь ритму его разливов, где они поклонялись богам Египта, свидетельствуя об их славе, могуществе и соперничестве, где трудом воинов, писцов и ученых была создана величайшая из империй, где расцветали искусство Киклад, творчество мастеров, создававших храмы, дворцы, города, где тесно сплетались жизни людей, героев и богов, запечатленные в легендах и мифах Древней Греции, где родились Олимпийские игры, наука и театр с трагедией и комедией. Во второй части книги мы побываем там, где возник из легенды Рим царей. Мы узнаем о судьбах республики и империи. Увидим, как Рим стал центром вселенной, столицей богов и людей, где жили императоры и легаты, офицеры и центурионы, конники и лучники. Мы станем свидетелями рождения новой религии - христианства, заката Рита и нашествия варваров, гуннов, вестготов, вандалов."},{"i":424,"t":"Детская энциклопедия","a":"б/а","g":"Энциклопедия","c":"","y":"1995","e":1,"d":"Это были времена, когда миру открывалась мудрость Будды и Индия с ее кастами и терпимостью... Когда за Великой стеной пробуждалась \"Срединное царство\"... Когда в Стране Восходящего солнца соперничали в утонченности дворцовое и военное искусства... Когда тысяча африканских народностей сходились на перекрестках торговых путей... Когда первые индейские племена постепенно расселялись на американском континенте и начинали возделывать маис... Когда Империи Солнца держались из века в век жертвенной кровью..."},{"i":425,"t":"Детская энциклопедия","a":"б/а","g":"Энциклопедия","c":"","y":"1995","e":1,"d":"Это были времена, когда укрепленный замок, знаменовавший власть, служил убежищем... Когда паломники и крестоносцы устремлялись на Восток... Когда в Европе строились монастыри и соборы... Когда за городскими стенами шумели ярмарки и свирепствовала чума... Когда возникшая из волн Венеция создала на торговле морскую империю..."},{"i":426,"t":"Детская энциклопедия","a":"б/а","g":"Энциклопедия","c":"","y":"1995","e":1,"d":"Это были времена, когда Столетняя война и церковный раскол терзали христианский Запад... Когда искусство и философия Италии поставили человека в центр познания... Когда Испания Сервантеса соперничала с Англией Шекспира..."},{"i":427,"t":"Детская энциклопедия","a":"перевод с общая редакция Е. Г. Морозовой. - 1995. - 961-1152, IX-XIII, IX-XIII с. : цв. ил. - (Открытие мира юношеством)","g":"Энциклопедия","c":"","y":"1995","e":1,"d":"Это были времена, когда Джемс Кук, Бугенвиль и Лаперуз открывали райские уголки Тихого океана... Когда в Европе правили просвещенные государи, остававшиеся при этом абсолютными и авторитарными... Когда Французская революция прославляла свободу, равенство, братство..."},{"i":428,"t":"Детская энциклопедия","a":"б/а","g":"Энциклопедия","c":"","y":"1995","e":1,"d":"От Туниса до Пекина - загадки Востока. От Лондона до Москвы - надежды рабочих. От Берлина до Будапешта - борьба за демократию. От Нью-Йорка до Парижа - детство современной техники."},{"i":429,"t":"Детская энциклопедия","a":"б/а","g":"Энциклопедия","c":"","y":"1995","e":1,"d":"Это были времена, когда европейцы только начинали исследовать африканские королевства... Когда Запад был образцом для подражания. Когда Китай эпохи маньчжурской династии Цин, переживая кризис, устремлялся к революции... Когда расцветала загадочная и изысканная культура феодальной Японии."},{"i":430,"t":"Детская энциклопедия","a":"б/а","g":"Энциклопедия","c":"","y":"1995","e":1,"d":"В книге рассказывается о \"великой депрессии\", сталинском СССР и маоистском Китая, Второй Мировой войне и поствоенном времени. О тех годах, когда под обломками \"безумных лет\" вызревала нацистская угроза и благодаря глобальному кризису Европу завоевали фашистские диктатуры."},{"i":431,"t":"Детям о Великой Отечественной войне","a":"б/а","g":"","c":"","y":"2021","e":9,"d":""},{"i":432,"t":"Джек - победитель великанов","a":"перевод с английского Н. Шерешевской","g":"Сказки","c":"","y":"1991","e":2,"d":""},{"i":433,"t":"Ф. Влюбиться по самые ушки","a":"Джонс А.","g":"Повесть","c":"","y":"2004","e":1,"d":""},{"i":434,"t":"Вечеринка под снегом","a":"Джонс А.Ф.","g":"Повесть","c":"","y":"2003","e":2,"d":"\"Вечеринка под снегом\" - очередная повесть для девочек из сериала \"Стейси и ее друзья\""},{"i":435,"t":"Маленькая бизнес-леди","a":"Джонс А.Ф.","g":"Повесть","c":"","y":"2004","e":2,"d":""},{"i":436,"t":"Приглашение на свидание","a":"Джонс А.Ф.","g":"Повесть","c":"","y":"2003","e":1,"d":"\"Приглашение на свидание\" - очередная повесть для девочек из сериала \"Стейси и ее друзья\""},{"i":437,"t":"Секретное зелье","a":"Джонс А.Ф.","g":"Повесть","c":"","y":"2004","e":1,"d":""},{"i":438,"t":"Черная маска","a":"Джонс А.Ф.","g":"Повесть","c":"","y":"2002","e":1,"d":"Юные археологи исследуют старинные обломки и разгадывают зловещую тайну черной маски"},{"i":439,"t":"По приколу на всю школу","a":"Джонс Ф.","g":"Повесть","c":"","y":"2005","e":1,"d":""},{"i":440,"t":"От диплодока до стегозавра","a":"Джонсон Д.","g":"","c":"","y":"2000","e":1,"d":""},{"i":441,"t":"Тайна змеиного зуба ; Тайна острова Макатунк","a":"Диксон Ф.У.","g":"Повесть","c":"","y":"1997","e":1,"d":""},{"i":442,"t":"Тайна расколотого шлема","a":"Диксон Ф.У.","g":"","c":"","y":"1995","e":1,"d":""},{"i":443,"t":"Тайна спирального моста","a":"Диксон Ф.У.","g":"","c":"","y":"1994","e":1,"d":"Братья Харди, Фрэнк и Джо в свободное от школы время с удовольствием помогают своему отцу, знаменитому сыщику Фентону Харди, раскрывать уголовные преступления. Они выслеживают преступников, устраивающих взрывы на секретных заводах, и находят таинственное убежище диверсантов."},{"i":444,"t":"Тайна форта с привидениями","a":"Диксон Ф.У.","g":"Повесть","c":"","y":"1993","e":3,"d":"Братья Харди идут по следам преступников, совершивших ряд необычных краж, и разгадывают тайну зловещего особняка с дверями без замков"},{"i":445,"t":"Звездные приключения Нуми и Ники","a":"Дилов Л.","g":"Роман","c":"","y":"1986","e":1,"d":""},{"i":446,"t":"(5.12.1901-15.12.1966). Возвращение Джафара","a":"Дисней У.Э.","g":"Сказки","c":"","y":"1992","e":1,"d":"Продолжение волшебной сказки об Аладдине в книге \"Возвращение Джафара\". Вторая часть захватывающей трилогии о храбром уличном воришке. Уже казалось бы, что черному чародею и новоявленному джинну Джафару суждено навеки остаться пленником волшебной лампы, – но ему удается освободиться! И на уме у коварного злодея лишь одно: он жаждет отомстить Аладдину!"},{"i":447,"t":"(5.12.1901-15.12.1966). История человечества от каменного века до наших дней","a":"Дисней У.Э.","g":"Энциклопедия","c":"","y":"2010","e":1,"d":"Микки, Минни, Дональд, Дейзи, Гуфи и Плуто готовы отправиться с тобой в увлекательное путешествие по миру знаний. Вместе вы разгадаете секреты науки и природы, прошлого и настоящего, совершите множество открытий. Вы узнаете, как появилась цивилизация, как создавались империи и как мир стал таким, каким мы знаем его сегодня"},{"i":448,"t":"Почемучка","a":"Дитрих А.К.","g":"","c":"","y":"1990","e":1,"d":""},{"i":449,"t":"Почемучка","a":"Дитрих А.К.","g":"","c":"","y":"1987","e":1,"d":""},{"i":450,"t":"Соседи по планете","a":"Дмитриев Ю.Д.","g":"","c":"","y":"1993","e":1,"d":""},{"i":451,"t":"Дневник Стива","a":"перевод с английского А. Гитлица","g":"","c":"","y":"2018","e":1,"d":""},{"i":452,"t":"Серебряные коньки","a":"Додж М.М.","g":"Рассказы","c":"","y":"2013","e":1,"d":"Широко известная повесть, которую читали дети нескольких поколений. В ней увлекательно рассказывается не только о жизни голландских школьников в середине ХIХ века, но и о Голландии (Королевстве Нидерландов) - истории, географии, жизни и обычаях этой маленькой европейской страны"},{"i":453,"t":"Доисторическая жизнь","a":"авт. предисл. А. Маккорд","g":"Учебное пособие","c":"","y":"1996","e":1,"d":"Эта книга - о развитии жизни на Земле с момента ее зарождения и до окончания каменного века в истории нашей планеты. Вы узнаете о самых первых живых организмах, обитавших в морях миллиарды лет тому назад, сможете проследить за длительным процессом эволюции животного мира"},{"i":454,"t":"Рассказы о Шерлоке Холмсе","a":"Дойл А.К.","g":"Рассказы","c":"","y":"2013","e":1,"d":""},{"i":455,"t":"Дома мира","a":"ред. М. Аксенова","g":"Энциклопедия","c":"","y":"2007","e":1,"d":""},{"i":456,"t":"Домовой из Хилтона","a":"Н. Шерешевская. - Ташкент : Шарк, 1993. - 108 с. : ил","g":"Сказки","c":"","y":"1993","e":1,"d":"Настоящий сборник знакомит читателя с народными сказками Британии. Эти сказки помогают лучше понять национальную психологию, историю, нравы и обычаи народа."},{"i":457,"t":"Математика","a":"Дорофеев Г.В.","g":"Учебник","c":"2","y":"2019","e":5,"d":""},{"i":458,"t":"Математика","a":"Дорофеев Г.В.","g":"Учебник","c":"2","y":"2019","e":5,"d":""},{"i":459,"t":"В. Целоваться запрещено!","a":"Драгунский К.","g":"","c":"","y":"2012","e":1,"d":""},{"i":460,"t":"Где это видано, где это слыхано...","a":"Драгунский В.Ю.","g":"","c":"","y":"2011","e":1,"d":""},{"i":461,"t":"Где это видано, где это слыхано...","a":"Драгунский В.Ю.","g":"","c":"","y":"2001","e":1,"d":""},{"i":462,"t":"Где это видано?","a":"Драгунский В.Ю.","g":"Рассказы","c":"","y":"2008","e":1,"d":""},{"i":463,"t":"Денискины рассказы","a":"Драгунский В.Ю.","g":"Рассказы","c":"","y":"2018","e":1,"d":""},{"i":464,"t":"Денискины рассказы. Друг детства","a":"Драгунский В.Ю.","g":"Рассказы","c":"","y":"2001","e":1,"d":""},{"i":465,"t":"Профессор кислых щей","a":"Драгунский В.Ю.","g":"","c":"","y":"2011","e":1,"d":"Знаменитый детский писатель Виктор Юзефович Драгунский писал весёлые, добрые, а порой и грустные истории про маленьких детей. Его книги ребятишки читают с удовольствием, ведь приключения сверстников всегда интересны. Герой самых знаменитых произведений Виктора Драгунского - озорник Дениска Кораблёв, который вечно попадает в удивительные и поучительные истории"},{"i":466,"t":"Проклятие Аркада","a":"Дрейк Э.","g":"","c":"","y":"2004","e":1,"d":""},{"i":467,"t":"Человекообразные обезьяны","a":"Дрешер В.Б.","g":"","c":"","y":"1991","e":1,"d":""},{"i":468,"t":"Что внутри человека?","a":"Дриллсма Б.","g":"","c":"","y":"1994","e":1,"d":"Книга дает возможность ребенку заглянуть внутрь тела человека и понять, как устроено одно из самых сложных творений природы - человек"},{"i":469,"t":"Приключения Карандаша и Самоделкина","a":"Дружков Ю.М.","g":"Сказки","c":"","y":"1992","e":1,"d":"Приключения маленького чудесного художника и храброго железного человечка: об их встречах с пиратом Буль-Буль, псом Кляксой, шпионом Дыркой, о том, как Карандаш и Самоделкин попали в беду. Кто же их выручил?"},{"i":470,"t":"Беглец","a":"Дубов Н.И.","g":"Рассказы","c":"","y":"1987","e":1,"d":"Книга рассказывает о духовном становлении подростка, о его нравственном воспитании"},{"i":471,"t":"Тайна оранжевого саквояжа","a":"Дубчак А.В.","g":"Повесть","c":"","y":"2000","e":1,"d":"Что может быть общего у бесследного исчезновения знаменитой актрисы с тайником немецких склепов? Обычные московские школьники проводят собственное расследование"},{"i":472,"t":"Моя жизнь. Моя Россия. Мой Есенин","a":"Дункан А.","g":"Рассказы","c":"","y":"1992","e":1,"d":"В книгу вошли автобиография известной американской танцовщицы Айседоры Дункан о событиях до 1921 года и воспоминания ее подруги Мэри Дести, в которых личная жизнь артистки воспроизведена вплоть до дня ее смерти в 1927 году. В книге много ярких портретов современников танцовщицы - художников, артистов, музыкантов, поэтов. Несколько глав \"Нерассказанной истории\" посвящены сложным отношениям между Дункан и Сергеем Есениным. Адресуется массовому читателю."},{"i":473,"t":"Мои звери","a":"Дуров В.Л.","g":"Рассказы","c":"","y":"1992","e":1,"d":""},{"i":474,"t":"Мои звери","a":"Дуров В.Л.","g":"","c":"","y":"2019","e":1,"d":""},{"i":475,"t":"Глубокое волшебство","a":"Дуэйн Д.","g":"","c":"","y":"2006","e":1,"d":""},{"i":476,"t":"Археология","a":"Дьелафэ Ф.","g":"Справочник","c":"","y":"2002","e":1,"d":"В книге рассказывается об организации экспедиций для поиска археологических объектов, об археологических раскопках, восстановлении культурных памятников"},{"i":477,"t":"Из истории физики и жизни ее творцов","a":"Дягилев Ф.М.","g":"","c":"","y":"1986","e":2,"d":""},{"i":478,"t":"Настоящая принцесса и Бродячий Мостик","a":"Егорушкина А.","g":"","c":"","y":"2003","e":1,"d":""},{"i":479,"t":"Ежко-Бежко и солнце","a":"худ. Е. Рачев","g":"Сказки","c":"","y":"1979","e":1,"d":"В книгу входят занимательные, веселые и поучительные сказки о животных"},{"i":480,"t":"Учусь правильно произносить слова. Орфоэпический словарик","a":"Елина Е.Г.","g":"Учебное пособие","c":"","y":"2006","e":1,"d":""},{"i":481,"t":"Тайна под дубом","a":"Елькина М.В.","g":"Повесть","c":"","y":"2002","e":2,"d":"Лешка и Толик каждый день находят в почтовом ящике зашифрованные послания. Неизвестный предлагает друзьям найти дуб в парке... Но что же за тайну скрывает старинный дуб? И кому понадобилось, чтобы именно ребята раскрыли эту тайну?"},{"i":482,"t":"Тайна спортивного клуба","a":"Елькина М.В.","g":"Повесть","c":"","y":"2000","e":1,"d":"Наконец-то у Антона и его друзей появилось помещение для собственного театра. Казалось бы, впору радоваться самим и радовать зрителей, да не тут-то было. Здоровенный парень из спортклуба по соседству требует немедленно убираться — сначала «по-хорошему», а затем и «по-плохому»… Чем же помешали ему юные актеры? Может, спортклуб — это только прикрытие для каких-нибудь темных дельцов или даже преступников? «А вот это очень похоже на правду!» — думают друзья и решают вывести подозрительных спортсменов на чистую воду. Тут-то к ребятам и попадает очень странная дискета…"},{"i":483,"t":"Тайна старинного парка","a":"Елькина М.В.","g":"Повесть","c":"","y":"2001","e":1,"d":""},{"i":484,"t":"Тайна украденной пальмы","a":"Елькина М.В.","g":"Повесть","c":"","y":"2003","e":1,"d":"Вот не думали не гадали ребята, что в научной экспедиции на берегу Байкала им придется заниматься разгадываем головоломок: то бесследно исчезают, то появляются из ниоткуда разные вещи, нужные и не очень"},{"i":485,"t":"Инопланетянин из бутылки","a":"Емец Д.А.","g":"Повесть","c":"","y":"2004","e":1,"d":""},{"i":486,"t":"Колесница призраков","a":"Емец Д.А.","g":"","c":"","y":"2007","e":1,"d":""},{"i":487,"t":"Мефодий Буслаев. Билет на Лысую гору","a":"Емец Д.А.","g":"Повесть","c":"2","y":"2006","e":1,"d":""},{"i":488,"t":"Мефодий Буслаев. Билет на Лысую гору","a":"Емец Д.А.","g":"Повесть","c":"","y":"2008","e":1,"d":""},{"i":489,"t":"Мефодий Буслаев. Маг полуночи","a":"Емец Д.А.","g":"Повесть","c":"","y":"2004","e":1,"d":"В книге Судеб записано, что Мефодий Буслаев пройдет лабиринт Храма Вечного Ристалища в день своего тринадцатилетия. Мальчишка, родившийся в минуту полного солнечного затмения, впитал тайный страх миллионов смертных. Именно тогда в нем пробудился дар. Благодаря своему дару, не осознавая того, он аккумулирует в себе самые разные энергии окружающих: любви, боли, страха, восторга, злости - и трансформирует их в абсолютную магию. Его дар и то, что он вынесет из Храма Вечного Ристалища, нужны стражам Тьмы, нужны и стражам Света... Как, сделав выбор между Светом и Тьмой, остаться собой? На этот вопрос Мефодию придется искать ответ самому..."},{"i":490,"t":"Мефодий Буслаев. Маг Полуночи","a":"Емец Д.А.","g":"Повесть","c":"","y":"2007","e":1,"d":""},{"i":491,"t":"Мефодий Буслаев. Месть Валькирий","a":"Емец Д.А.","g":"Роман","c":"","y":"2008","e":1,"d":"\"Валькирия не может полюбить. Валькирия обязана принять вызов, кем бы он ни был брошен. Никто из встречавших валькирию прежде никогда не узнает ее. Иначе тайна защитит себя сама, и всякий услышавший ее умрет. Валькирию-ослушницу ждет суд Двенадцати\". Таков непреложный закон. Убив в поединке полуночную ведьму, Ирка бросает вызов мраку. Уничтожить валькирию-одиночку должен именно Мефодий Буслаев. Копье валькирии и изменивший свету меч Древнира встретятся в бою, из которого выйдет живым только один. Ирка понимает, что Мефодий никогда не узнает ее в новом обличье. И, как бы хорошо он ни владел мечом, он уязвим. Ведь для победы ей достаточно просто назвать свое имя, и тогда свершится старое проклятие."},{"i":492,"t":"Мефодий Буслаев. Ожерелье дриады","a":"Емец Д.А.","g":"Повесть","c":"","y":"2009","e":1,"d":"Силы Мефодия не дают покоя мраку. Тридцатого июля Лигул надеется разом избавиться от Мошкина. Наты и Чимоданова, передав их способности новой наследнице - Прасковье, с помощью которой горбун планирует добраться и до Буслаева. Правда, рядом с ним постоянно находится Даф, а это все усложняет. Но вот настал подходящий момент: светлая напоролась на меч Мефа, и теперь в ее крови бушует темень. Только ожерелье дриады может помочь Дафне, а значит, темным стражам надо достать его первыми. Но не они одни жаждут завладеть целительным артефактом - у Арея тоже есть на него планы. Ожерелье может навсегда защитить эйдос его дочери от мрака..."},{"i":493,"t":"Мефодий Буслаев. Светлые крылья для темного стража","a":"Емец Д.А.","g":"Повесть","c":"2","y":"2007","e":1,"d":"Незадолго до гибели повелитель мрака Кводнон написал на пергаменте имя преемника и запечатал его своей печатью. А когда после смерти Кводнона стали искать это завещание, оказалось, что оно исчезло. Волею судьбы, ибо ничего в духовном мире случайного нет, этот пергамент, а вместе с ним и эйдос Улиты, попал в руки Мефодия и Дафны. Эйдос Улиты уникален - он единственный сочетает в себе свет и тьму. Пергамент и эйдос ищет бывший приближенный Кводнона Спуриус. Он мечтает занять место Лигула и стать повелителем Мрака. Страшно представить, что произойдет, если Спуриус, разобравшись в тайне эйдоса Улиты, сумеет вселить мрак во все приходящие в мир эйдосы. Душа человека тогда станет творением не только Света, но и Мрака..."},{"i":494,"t":"Мефодий Буслаев. Свиток желаний","a":"Емец Д.А.","g":"Повесть","c":"","y":"2005","e":1,"d":"В стародавние времена маг-алхимик Бругус изготовил свиток желаний, на который наложил заклинание усиления. Свиток он спрятал в одну из двух шкатулок, защищенных магией Света, и отправил их странствовать в лопухоидный мир. За прошедшие века свиток приобрел чудовищную магическую силу. Свиток желаний - артефакт нейтральный. Он может служить как Тьме, так и Свету. Ищут его златокрылые, ищут и стражи Мрака. Если Тартар обнаружит шкатулку со свитком первым, произойдет катастрофа... А еще мудрецы из Прозрачных Сфер утверждают, что история свитка напрямую будет связана с Дафной, стражем Света, и Мефодием Буслаевым - будущим повелителем Тьмы..."},{"i":495,"t":"Мефодий Буслаев. Свиток желаний","a":"Емец Д.А.","g":"Повесть","c":"","y":"2009","e":1,"d":""},{"i":496,"t":"Мефодий Буслаев. Тайная магия Депресняка","a":"Емец Д.А.","g":"Повесть","c":"","y":"2008","e":1,"d":"Двое любят друг друга - кто вправе им мешать? Страж света Дафна встречается с Мефодием Буслаевым, воплощением мрака... Свет не может допустить этого. Ведь когда черная краска смешивается с белой, получается серый цвет. Вежливая терпимость к злу и равнодушие - вот что теперь ждет весь мир. Свет в панике. Нельзя рисковать вечностью тысяч эйдосов ради одной любви. Мефодия и Даф нужно разлучить, иначе мироздание окажется под угрозой. Хранитель Дафны Эссиорх получил приказ похитить ее и доставить в Эдем. И помочь ему в этом должна валькирия-одиночка Ирка. Но у главы канцелярии мрака Лигула свои планы на Даф..."},{"i":497,"t":"Мефодий Буслаев. Третий всадник мрака","a":"Емец Д.А.","g":"Повесть","c":"","y":"2008","e":1,"d":"Полубоги не уходят без следа. Они не могут покинуть этот мир, не передав бессмертие и дар... Валькирия умирала... Умирала, раненная мечом, который разит даже бессмертных. Умирала в кухне зауряднейшего из домов, на полу, залитом её кровью. Рядом с ней лежала Ирка, упавшая с инвалидного кресла и с ужасом и восторгом внимавшая словам неожиданной \"гостьи\". Отныне Ирка становится валькирией! Нет больше беспомощной калеки! Ей предстоит сразиться с третьим всадником мрака. А вскоре она узнает, что это призрак бывшего властелина мрака Кводнона, выпустивший посланца из-за Жутких Ворот, который и погубил валькирию. Кводнон собирается воплотиться в Мефодия Буслаева. И если это произойдёт..."},{"i":498,"t":"Пришельцы из холодильника","a":"Емец Д.А.","g":"Повесть","c":"","y":"2003","e":1,"d":""},{"i":499,"t":"Пришельцы из холодильника","a":"Емец Д.А.","g":"Повесть","c":"","y":"2007","e":1,"d":"\"И зачем только мы высадились на астероид?.\" - сокрушенно размышлял юный космонавт Митрофан. Обнаруженный его семьей корабль инопланетян пролежал на астероиде много миллионов лет. Но это не помешало туманникам - грозным и загадочным космическим пришельцам - захватить звездолет \"Кашалот\". Роботы Репка и Коробок отключены, а родители Митрофана не могут помочь своим детям. Теперь Митрофану, его брату Пельменю и сестре Дискетке не остается ничего другого, как самим сразиться с коварными пришельцами. Ведь настоящие повелители галактик не боятся ничего на свете…"},{"i":500,"t":"Сердце пирата","a":"Емец Д.А.","g":"Повесть","c":"","y":"2003","e":1,"d":"Ежика, исполняющего любые желания хозяина, хочет похитить космический пират Крокс. Ребятам - Андрею и Лависсе и их другу - роботу необходимо забрать и спрятать ежика от пирата, но на их пути стоит множество опасных препятствий"},{"i":501,"t":"Таня Гроттер и болтливый сфинкс","a":"Емец Д.А.","g":"Повесть","c":"","y":"2002","e":1,"d":"[Новая повесть известного писателя о приключениях Тани Гроттер и ее борьбе с черной волшебницей Чума-дель-Торт]"},{"i":502,"t":"Таня Гроттер и болтливый сфинкс","a":"Емец Д.А.","g":"Повесть","c":"","y":"2008","e":1,"d":""},{"i":503,"t":"Таня Гроттер и Исчезающий Этаж","a":"Емец Д.А.","g":"Повесть","c":"","y":"2003","e":2,"d":"Что творится с Исчезающим Этажом в Тибидохсе? Все, кто отважился проникнуть туда, не вернулся назад. Читателя этой книги ждут встречи с привидениями и новые, невероятные приключения Тани Гроттер"},{"i":504,"t":"Таня Гроттер и молот Перуна","a":"Емец Д.А.","g":"Повесть","c":"","y":"2003","e":1,"d":"Новая книга кандидата филологических наук и члена Союза писателей Дмирия Емца долгожданное продолжение приключений Тани Гроттер в школе магии Гибидохас, расположенной на острове Буяне"},{"i":505,"t":"Таня Гроттер и проклятие некромага","a":"Емец Д.А.","g":"Повесть","c":"","y":"2007","e":1,"d":"Жидкое зеркало некромага Тантала… Отвратительный темный артефакт, который наделяет даром особого оборотничества. Жизни двух людей - твоя и того, чей облик ты примешь хотя бы раз - с этой минуты сливаются воедино. Уколется один - кровь у обоих. Постепенно их сознание тоже начинает объединяться. Тот из двоих, кто нравственно сильнее, будет влиять на более слабого… Таня мучительно пытается понять, для чего жидкое зеркало Тантала могло понадобиться Бейборсову? Зачем он похитил его из хранилища для особо опасных артефактов? Теперь Магщество разыскивает некромага как преступника. А Глеб скрывается где-то на Буяне. Вскоре Тане и ее друзьям становится известно, что в темнице Чумы-дель-Торт заточен дух Тантала. Все это очень странно. А тут еще на носу драконбольный матч между сборной мира и сборной вечности"},{"i":506,"t":"Таня Гроттер и трон Древнира","a":"Емец Д.А.","g":"Повесть","c":"","y":"2003","e":1,"d":"Давненько в Тибидохсе не было таких неприятностей! Похищены основные источники магии: предметы, принадлежавшие когда-то Древниру. Правда, существует еще трон древнего мага, энергии которого хватит на тысячелетия. Но беда в том, что никто не знает, где он находится. День ото дня запасы магии в Тибидохсе иссякают, и все ученики отправлены в мир лопухойдов. Таня Гроттер и Баб-Ягун оказываются в семействе Дурневых... Но ничего в магическом мире не может быть важнее драконбола. Все с нетерпением ждут матча команды невидимок со сборной Тибидохса. Интригу накаляет то, что легендарный Гурий Пуппер наконец влюблен. Сотнями летят купидончики с цветами и письмами! Интересно, кому Пуппер их посылает? Без охмуряющей магии тут явно не обошлось... Но Таня совсем не этого хотела!"},{"i":507,"t":"Хрюша - любовь моя","a":"Ермилина Л.К.","g":"","c":"","y":"1994","e":1,"d":""},{"i":508,"t":"С. Мудрые науки - без назидания и скуки","a":"Ефимовский Е.","g":"Рассказы","c":"","y":"1994","e":1,"d":"О том, как было открыто электричество, как изобрели часы, радио, кино и многое другое автор рассказывает в стихах"},{"i":509,"t":"Минус один","a":"Жвалевский А.В.","g":"Повесть","c":"","y":"2019","e":1,"d":""},{"i":510,"t":"Живая планета [Электронный ресурс]","a":"б/а","g":"Энциклопедия","c":"","y":"2007","e":1,"d":""},{"i":511,"t":"Жизнь Есенина","a":"составитель, автор вступительной статьи и примечаний С. П. Кошечкин","g":"Рассказы","c":"","y":"1988","e":1,"d":"Книга представляет собою хронологический рассказ родных, друзей, знакомых Сергея Есенина о жизни поэта, истоках его патриотической лирики, о связях художника с видными писателями-современниками. Среди авторов воспоминаний: Е. и А. Есенины, М. Горький, Н. Тихонов, С. Городецкий, Вс. Рождественский, П. Чагин, В. Качалов, А. Миклашевская и другие."},{"i":512,"t":"Жилища. Хижины, дома, дворцы","a":"автор текста Фиона Макдональд","g":"","c":"","y":"1995","e":1,"d":""},{"i":513,"t":"Жители моря","a":"главный редактор М. Аксенова","g":"","c":"","y":"2008","e":1,"d":""},{"i":514,"t":"Жители моря","a":"б/а","g":"","c":"","y":"2003","e":1,"d":""},{"i":515,"t":"С. Что я видел","a":"Житков Б.","g":"Рассказы","c":"","y":"2005","e":1,"d":""},{"i":516,"t":"Что я видел","a":"Житков Б.С.","g":"Рассказы","c":"","y":"2006","e":1,"d":""},{"i":517,"t":"Беспризорная кошка","a":"Житков Б.С.","g":"Рассказы","c":"","y":"2003","e":1,"d":"В книгу вошли добрые и трогательные рассказы известного детского писателя о животных"},{"i":518,"t":"Рассказы","a":"Житков Б.С.","g":"Рассказы","c":"","y":"2014","e":1,"d":""},{"i":519,"t":"Рассказы для детей","a":"Житков Б.С.","g":"Рассказы","c":"","y":"1998","e":1,"d":"В книгу вошли лучшие рассказы писателя для детей и юношества о животных. Главная тема рассказов Б.Житкова - это изображение отношений человека и животного, поведения человека в минуту опасности, любовь и дружба человека и зверя"},{"i":520,"t":"Рассказы о животных","a":"Житков Б.С.","g":"Рассказы","c":"","y":"2000","e":1,"d":"Рассказы классика детской литературы о братьях наших меньших."},{"i":521,"t":"Рассказы о животных","a":"Житков Б.С.","g":"Рассказы","c":"","y":"2003","e":2,"d":""},{"i":522,"t":"Путешествие по стране Геометрии","a":"Житомирский В.Г.","g":"","c":"","y":"1994","e":1,"d":"Авторы книги в занимательной и доступной форме знакомят детей 6-8 лет с основными геометрическими понятиями, учат их ориентироваться в простейших геометрических ситуациях. Герои книги Карандаш, Самоделкин, Буратино и Незнайка помогут малышам совершить интересное путешествие по стране Геометрии. Для совместного чтения родителей с детьми."},{"i":523,"t":"За горами, за лесами...","a":"составитель, автор предисловия и комментариев В. А. Грихин","g":"Словарь","c":"","y":"1989","e":1,"d":"В сборник включены сказки русских писателей первой половины XIX века. Тексты сказок расположены в хронологической последовательности. В комментариях приводятся краткие сведения об авторах и времени написания сказок, даются объяснения трудных для понимания слов и выражений. Значение устаревших и малоупотребительных слов приводится в словаре."},{"i":524,"t":"За землю Русскую","a":"перевод с древнерусского, составление, предисловие и примечания Л. А. Дмитриева","g":"Повесть","c":"","y":"1980","e":1,"d":""},{"i":525,"t":"Русская история от Екатерины Великой до Александра I","a":"Заичкин И.А.","g":"","c":"","y":"1994","e":1,"d":""},{"i":526,"t":"Заколдованное счастье","a":"художник А. Жиляев","g":"Сказки","c":"","y":"2013","e":1,"d":"Главному герою сказки Р.Л.Стивенсона \"Волшебная бутылка\", моряку Кеаве, страшно повезло - за сущие копейки он купил чудесный сосуд, который может исполнить любое желание. Однако у выгодного приобретения есть и оборотная сторона: если от него вовремя не избавиться, дух, заточенный в бутыли, станет хозяином души ее обладателя. Казалось бы, ничто не может спасти моряка от этого проклятия, однако искренняя любовь победила злого духа. Кеаве и его прекрасная жена Кокуа преодолели соблазн, избавились от жуткой бутылки и жили долго и счастливо на Гавайских островах. Сказка А.Дюма \"Кегельный король\" - поучительная история о том, что каждый может ошибаться, и в этом нет ничего дурного, если вовремя исправить ошибку. Талантливый и симпатичный токарь Готлиб стремился стать лучшим во всем, и у него это получалось. Однако он не выдержал испытание славой и подписал договор с колдуном. Готлиб не стал счастливее, напротив, он потерял покой и не обрел славу, о которой мечтал. Тогда он решил изменить свою жизнь и отказался выполнять условия договора"},{"i":527,"t":"Замки. Дворцы","a":"б/а","g":"","c":"","y":"2003","e":1,"d":""},{"i":528,"t":"Занимательные географические задачи и вопросы","a":"Н. Н. Студенцов, Э. Л. Фабусович, Е. Ф. Легенькая, Г. П. Пивоварова. - 5-е изд., перераб. и доп","g":"Учебное пособие","c":"","y":"1978","e":1,"d":""},{"i":529,"t":"Фельдмаршал Б. П. Шереметев","a":"Заозерский А.И.","g":"","c":"","y":"1989","e":1,"d":""},{"i":530,"t":"Заповедники мира","a":"б/а","g":"Энциклопедия","c":"","y":"2007","e":1,"d":"Деятельность человека часто наносит непоправимый ущерб природе. Осознание этого факта привело к тому, что люди стали создавать заповедные территории."},{"i":531,"t":"Заря-заряница","a":"собрала и обработала Н. Колпакова","g":"Сказки","c":"","y":"1988","e":2,"d":""},{"i":532,"t":"Кто ходит в гости по утрам","a":"Заходер Б.В.","g":"Поэзия","c":"","y":"2006","e":1,"d":""},{"i":533,"t":"Мохнатая азбука","a":"Заходер Б.В.","g":"","c":"","y":"2012","e":1,"d":""},{"i":534,"t":"Мы - друзья","a":"Заходер Б.В.","g":"Поэзия","c":"","y":"2012","e":1,"d":""},{"i":535,"t":"Про всех на свете","a":"Заходер Б.В.","g":"Сказки","c":"","y":"2005","e":1,"d":""},{"i":536,"t":"Стихи и сказки","a":"Заходер Б.В.","g":"Сказки","c":"","y":"2017","e":1,"d":""},{"i":537,"t":"Звездные войны. Повстанцы","a":"перевод с английского Е. Познанской","g":"","c":"","y":"2015","e":1,"d":"Для Галактики настали темные времена. Поглощая один мир за другим, Империя наращивает свою мощь. Имперские войска оккупировали далекую планету и установили на ней деспотический режим. Но находятся смельчаки, готовые противостоять вражеским силам. Это экипаж космического корабля \"Призрак\"! Команде повстанцев предстоит столкнуться лицом к лицу с новыми грозными противниками. Они станут героями и смогут поднять восстание!"},{"i":538,"t": i":680,"t":"Артемис Фаул. Затерянный мир","a":"Колфер Й.","g":"Роман","c":"","y":"2007","e":1,"d":"Из дневника Артемиса Фаула: \"Как я и ожидал, Жеребкинс по-прежнему пытается следить за мной. Только в своем компьютере я обнаружил с десяток шпионских устройств. Что ж, как говорят герои кинобоевиков, \"в эту игру можно играть вдвоем\". Мне удалось перенаправить действие программ-шпионов, и теперь наш любознательный кентавр видит в моем компьютере только то, что я ему позволяю видеть, зато я имею полный доступ к его базе данных. Просматривая файлы Жеребкинса, я почти сразу же наткнулся на нечто интересное. Оказывается, кроме известных мне ветвей волшебного народца - эльфов, гномов, пикси и так далее, - существует еще одна, восьмая ветвь. Демоны. До сих пор мне не доводилось сталкиваться с ними лишь потому, что они покинули наш мир много лет назад, причем весьма необычным способом: через туннель во времени. Известно также, что некоторые демоны порой попадают на Землю. Место и время материализации можно вычислить. Эта задача по силам только блестящему уму, а значит, стоит попробовать...\""},{"i":681,"t":"Артемис Фаул. Ответный удар","a":"Колфер Й.","g":"Роман","c":"","y":"2005","e":1,"d":""},{"i":682,"t":"Артемис Фаул. Секретные материалы","a":"Колфер Й.","g":"Роман","c":"","y":"2005","e":1,"d":""},{"i":683,"t":"Конан и повелители пещер","a":"б/а","g":"","c":"","y":"1993","e":1,"d":""},{"i":684,"t":"КОНЕВ, А.Ф. ТАЙНА ПРОПАВШЕЙ КОЛЛЕКЦИИ","a":"А.Ф. КОНЕВ. - МИНСК : Современный литератор, 1999. - 256С. - (ДЕТЕКТИВ ДЛЯ ДЕВОЧЕК И МАЛЬЧИКОВ)","g":"","c":"","y":"1999","e":1,"d":""},{"i":685,"t":"Биология","a":"Константинов В.М.","g":"","c":"7","y":"2021","e":30,"d":""},{"i":686,"t":"Сказки коапповского леса","a":"Константиновский М.А.","g":"Сказки","c":"","y":"1998","e":1,"d":""},{"i":687,"t":"Вор понарошку","a":"Кораблев А.Б.","g":"Повесть","c":"","y":"1998","e":2,"d":""},{"i":688,"t":"Рыбалка на живца","a":"Кораблев А.Б.","g":"Повесть","c":"","y":"1997","e":1,"d":""},{"i":6 ика Уголька, всю жизнь мечтавшего о верном друге"},{"i":709,"t":"Красивые сказки малышам","a":"худож. Э. Ферез","g":"Сказки","c":"","y":"2012","e":1,"d":""},{"i":710,"t":"Красная книга России","a":"Ю. А. Дунаева, А. О. Новичонок, Е. Ю. Снегирева","g":"","c":"","y":"2021","e":1,"d":""},{"i":711,"t":"Едем, плывем, летим. Простые модели своими руками","a":"Красных А.В.","g":"","c":"","y":"2019","e":1,"d":""},{"i":712,"t":"Толковый словарь паронимов русского языка","a":"Красных В.И.","g":"Словарь","c":"","y":"2007","e":3,"d":""},{"i":713,"t":"Краткий словарь литературоведческих терминов","a":"Абрамович Г. Л","g":"Словарь","c":"","y":"1985","e":1,"d":""},{"i":714,"t":"Краткий толковый словарь русского языка","a":"сост. И. Л. Городецкая","g":"Словарь","c":"","y":"1985","e":1,"d":"Словарь содержит более 5 000 употребительных и актуальных слов русского языка, даются основные грамматические формы, фразеология, конкретная лексика поясняется рисунками. Слово в основном значении переводится на английский, французкий, испанский и немецкий языки."},{"i":715,"t":"Тайна пишущей машинки","a":"Краузе Х.","g":"Повесть","c":"","y":"1996","e":2,"d":"У пожилой женщины отравили собаку. Юные сыщики решили отыскать преступника, но у них на руках только одна улика - письмо с угрозами, отпечатанное на машинке с прыгающей буквой. Единственный способ найти отравителя - узнать, кто владелец пишущей машинки…"},{"i":716,"t":"Крепости и кремли России","a":"ответственный редактор Н. Ипатько","g":"Энциклопедия","c":"","y":"2010","e":1,"d":"Книга знакомит читателя с известнейшими фортификационными сооружениями России, начиная с самой древней Дербентской крепости и заканчивая Брестской крепостью-героем. В древнерусском кремле сосредоточивалась жизнь города - политическая, культурная, духовная. А когда подступал враг, здесь разворачивалась кипучая военная деятельность, в которой принимали участие все горожане. С течением веков военную роль стали брать на себя крупнейшие монастыри, превращавшиеся в грозные и неприступные твердыни. Строительство крепостей было не только военно-инженерной задачей, в нем находили применение и эстетические представления зодчих, художественно одаренных мастеров-фортификаторов. Позднейшие же крепости хотя и уступают в архитектурном отношении творениям древних зодчих, но их вклад в защиту Отечества не менее велик. В книге рассказывается не только о создании и архитектуре оборонных сооружений, но и о самых ярких страницах их военной истории - сражениях, героических \"осадных сидениях\"."},{"i":717,"t":"Крестоносцы","a":"худ. И. Дзысь","g":"","c":"","y":"1996","e":1,"d":""},{"i":718,"t":"Критская , Елена Дмитриевна. Музыка","a":"Е. Д. Критская , Г. П. Сергеева, Т. С. Шмагина","g":"Учебник","c":"3","y":"2019","e":3,"d":""},{"i":719,"t":"Круглый год","a":"составитель А. Ф. Некрылова","g":"","c":"","y":"1991","e":1,"d":""},{"i":720,"t":"Автомобильчик Бип","a":"Крюкова Т.Ш.","g":"","c":"","y":"2004","e":1,"d":""},{"i":721,"t":"Блестящая калоша с правой ноги","a":"Крюкова Т.Ш.","g":"","c":"","y":"1998","e":1,"d":"Однажды рассеянный Волшебник потерял калошу, которая жила у него так долго, что и сама научилась творить чудеса. Отправившись в путешествие, Калоша встречается с разными ребятами. Среди них и драчун, и трус, и лентяй, и врун. Для каждого у Калоши припасена своя волшебная история. Она помогает ребятам взглянуть на себя со стороны и измениться к лучшему"},{"i":722,"t":"Калоша волшебника или Занимательное пособие по правилам поведения","a":"Крюкова Т.Ш.","g":"Учебное пособие","c":"","y":"2009","e":1,"d":""},{"i":723,"t":"Я хочу читать","a":"Кубасова О.В.","g":"Учебник","c":"2","y":"2013","e":1,"d":"Книга для чтения предназначена для учащихся начальных классов для использования в классе. Содержит разнообразный литературный материал, а также методический аппарат. Пособие способствует литературному развитию младших школьников, улучшению техники чтения, формированию навыков работы с текстом и книгой."},{"i":724,"t":"Письмо шло пять тысячелетий ы религиозных культур и светской этики. Основы православной культуры","a":"Кураев А.В.","g":"Учебник","c":"4","y":"2018","e":8,"d":""},{"i":740,"t":"По следам Почемучки","a":"Кургузов О.Ф.","g":"","c":"","y":"1995","e":1,"d":""},{"i":741,"t":"Возвращение блудного попугая","a":"Курляндский А.","g":"","c":"","y":"2011","e":1,"d":""},{"i":742,"t":"Ну, погоди!","a":"Курляндский А.Е.","g":"","c":"","y":"2004","e":1,"d":""},{"i":743,"t":"А нас и здесь неплохо кормят!","a":"Курляндский А.Е.","g":"Сказки","c":"","y":"1999","e":1,"d":"Книга о совершенно новых, никому неизвестных приключениях толстого, ленивого Кота Василия, героя вашего любимого мультфильма \"Возвращение блудного попугая\". Яркие, забавные иллюстрации."},{"i":744,"t":"Вы не были на Таити?","a":"Курляндский А.Е.","g":"Сказки","c":"","y":"1997","e":1,"d":"О забавных приключениях знаменитого мультипликационного героя вы можете почитать в этой книге"},{"i":745,"t":"Новые приключения Кеши","a":"Курляндский А.Е.","g":"","c":"","y":"2004","e":1,"d":""},{"i":746,"t":"Ну, погодите! или Двое на одного","a":"Курляндский А.Е.","g":"","c":"","y":"2002","e":1,"d":""},{"i":747,"t":"Прелестно!","a":"Курляндский А.Е.","g":"Сказки","c":"","y":"2000","e":1,"d":"В мультфильме \"Возвращение блудного попугая\" есть такой персонаж - Ворона, которая по любому поводу говорила \"Прелестно!\" Шляпку рваную нашла - прелестно! Кеша что-то сказал - прелестно! Все у нее - прелестно! Вот эта книжечка - новые истории об этой замечательной Вороне."},{"i":748,"t":"Курпатова-Ким, Л. Максимус Гром. Атака Джокера. Кн. 2","a":"Л. Курпатова-Ким","g":"","c":"","y":"2006","e":1,"d":""},{"i":749,"t":"Курпатова-Ким, Лилия. Максимум Гром. Война за биософт. Кн. 3","a":"Л. Курпатова-Ким","g":"","c":"","y":"2008","e":1,"d":""},{"i":750,"t":"Курпатова-Ким, Лилия. Максимус Гром. Побег из Эдена","a":"Лилия Курпатова-Ким","g":"","c":"","y":"2006","e":1,"d":""},{"i":751,"t":"Влюбленная принцесса","a":"Кэбот М.","g":"Сказки","c":"","y":"2005","e":1,"d":"\"Влюбленная принцесса\" продолжает рассказ о жизни Миа, начатый в книгах \"Дневники принцессы\" и \"Принцесса в центре внимания\" Миа — самая счастливая девушка на свете. Во-первых, она принцесса. Во-вторых, у нее наконец-то появился парень. Но жизнь принцессы не так проста. Между выступлениями перед светским обществом и подготовкой к экзаменам Мие приходится спасаться от слишком навязчивых поцелуев ее возлюбленного Кенни. И кажется, она испытывает чувства к другому парню… Жизнь принцессы совсем не похожа на сказку!"},{"i":752,"t":"Дневники принцессы","a":"Кэбот М.","g":"","c":"","y":"2004","e":1,"d":"Мальчики совершенно не интересуются Миа - наверное, она недостаточно красива. Кроме того, у нее не ладится с алгеброй. Правда, у Миа есть хорошая подруга. А еще жизнь приготовила ей сюрприз. Она оказалась принцессой и вскоре должна унаследовать трон! Возможно, кого-то это известие обрадовало бы, но только не Миа..."},{"i":753,"t":"Принцесса ждет","a":"Кэбот М.","g":"","c":"","y":"2005","e":1,"d":""},{"i":754,"t":"Тайна вредного коллекционера ; Тайна мерцающих скал","a":"Кэри М.","g":"Повесть","c":"","y":"2001","e":1,"d":"Главные герои этой книги - три юных сыщика. Друзья-детективы смело берутся за самые сложные и запутанные дела и с честью доводят их до конца"},{"i":755,"t":"Алиса в стране чудес","a":"Кэрролл Л.","g":"Повесть","c":"","y":"2010","e":1,"d":""},{"i":756,"t":"Приключения Алисы в Стране Чудес ; Алиса в Зазеркалье","a":"Кэрролл Л.","g":"Сказки","c":"","y":"1992","e":1,"d":"Вот уже больше сотни лет книга об Алисе дарит людям радость знакомства с миром, в котором причудливо переплелись реальность и выдумка, веселый смех и грустная улыбка."},{"i":757,"t":"Волшебные сказки","a":"Лабуле Л.Э.Р.","g":"Сказки","c":"","y":"2002","e":1,"d":"Сказки французского писателя Эдуарда Лабулэ де Лефевра (1811-83) прославляют находчивых и смелых бедняков, мудрых и добрых правителей. Данные произведения включены в программу по внеклассному чтению"},{"i":758,"t":"Верните новенький скелет","a":"Лаврова С.А.","g":"Повесть","c":"","y":"2014","e":1,"d":""},{"i":759,"t":"Путешествие Нильса с дикими гусями","a":"Лагерлеф С.","g":"Сказки","c":"","y":"2003","e":1,"d":""},{"i":760,"t":"Путешествие Нильса с дикими гусями","a":"Лагерлеф С.","g":"Сказки","c":"","y":"2018","e":1,"d":"Знаменитая сказка шведской писательницы, лауреата Нобелевской премии не только развивает воображение малышей, но и в увлекательной, волшебной, нескучной форме даёт им знания о зоологии и географии. А красочные приятные глазу иллюстрации Григория Мацыгина делают сказку ещё увлекательнее!"},{"i":761,"t":"География","a":"Лазаревич К.С.","g":"Справочник","c":"6-10","y":"1997","e":1,"d":""},{"i":762,"t":"Необыкновенные приключения Карика и Вали","a":"Ларри Я.Л.","g":"Сказки","c":"","y":"1992","e":1,"d":""},{"i":763,"t":"Что внутри разных механизмов?","a":"Лафферти П.","g":"Рассказы","c":"","y":"1995","e":1,"d":"Книга в увлекательной форме рассказывает детям об устройстве механизмов, многими из которых люди пользуются почти ежедневно, ­ от холодильника и стиральной машины до телефона и видеомагнитофона. Красочные, подробные иллюстрации"},{"i":764,"t":"Ле Гуин, Урсула Кребер. (Род. 1929). Волшебник Земноморья. Т. 2. Кн. 3","a":"У. К. Ле Гуин","g":"Роман","c":"","y":"1993","e":1,"d":"ТРЕТИЙ РОМАН ТРИЛОГИИ О ЧАРОДЕЕ И ПУТЕШЕСТВЕННИКЕ ГЕДЕ ИЗ УДИВИТ.И ПРЕКРАСНОЙ СТРАНЫ ЗЕМ-НОМОРЬЕ."},{"i":765,"t":"Сказочные приключения маленького астронома","a":"Левитан Е.П.","g":"Сказки","c":"","y":"1990","e":1,"d":"Герою этой сказки необыкновенно повезло. С ним разговаривали Солнце и Луна, кометы и звезды, луч света и повелитель времени. От них Сережка узнал, как устроена наша прекрасная Вселенная. Об этом узнаешь и ты, внимательно прочитав книгу"},{"i":766,"t":"Календарь майя","a":"Ледерман В.В.","g":"Повесть","c":"","y":"2019","e":1,"d":""},{"i":767,"t":"Я познаю мир. Тайны природы","a":"Леонович А.А.","g":"Энциклопедия","c":"","y":"2000","e":1,"d":""},{"i":768,"t":"Самый - самый - самый - самый...","a":"Ливанов В.Б.","g":"","c":"","y":"2000","e":1,"d":""},{"i":769,"t":"Самый - самый - самый - самый...","a":"Ливанов В.Б.","g":"","c":"","y":"1999","e":1,"d":""},{"i":770,"t":"Дети с Горластой улицы","a":"Линдгрен А.","g":"Повесть","c":"","y":"2010","e":1,"d":"Юнас, Миа-Мария и маленькая Лотта живут в доме на горластой улице. Им всегда так весело, как никаким другим детям на свете. Хотя Лотта и упряма, как старая коза, как говорит ес папа. И вся напичкана выдумками, как говорит про нес дедушка. Вы только подумайте, однажды она развесила блины на дереве, и они качались на ветру, а Лотта, когда ей хотелось, откусывала от каждого по кусочку, я играю, будто я ягнснок и ем в лесу листья,= говорит она. Да, Лотта почти всегда играет, впрочем, и Юнас с Миа-Марией тоже от нес не отстают."},{"i":771,"t":"Малыш и Карлсон, который живет на крыше","a":"Линдгрен А.","g":"","c":"","y":"2001","e":1,"d":"Первая книга трилогии о Малыше и Карлсоне"},{"i":772,"t":"Малыш и Карлсон, который живет на крыше","a":"Линдгрен А.","g":"","c":"","y":"1992","e":1,"d":""},{"i":773,"t":"Малыш и Карлсон, который живет на крыше","a":"Линдгрен А.","g":"Повесть","c":"","y":"2007","e":1,"d":""},{"i":774,"t":"Приключения Эмиля из Леннеберги","a":"Линдгрен А.","g":"Повесть","c":"","y":"2008","e":1,"d":""},{"i":775,"t":"Расмус-бродяга","a":"Линдгрен А.","g":"Повесть","c":"","y":"2000","e":1,"d":"В этой книге читатель познакомится с Расмусом-бродягой, мальчиком-сиротой, чья жизнь сложилась отнюдь не безоблачно. Ему предстоит пережить немало неожиданных и таинственных приключений и наконец обрести счастье домашнего очага."},{"i":776,"t":"Рони, дочь разбойника","a":"Линдгрен А.","g":"Сказки","c":"","y":"1987","e":1,"d":""},{"i":777,"t":"Я познаю мир","a":"Линдер И.М.","g":"Энциклопедия","c":"","y":"2002","e":1,"d":""},{"i":778,"t":"Маленький гном Вася","a":"Липскеров М.Ф.","g":"","c":"","y":"1999","e":1,"d":""},{"i":779,"t":"Самый маленький гном и другие сказки","a":"Липскеров М.Ф.","g":"Сказки","c":"","y":"2017","e":1,"d":""},{"i":780,"t":"Самое кругосветное плавание","a":"Лир Э.","g":"Сказки","c":"","y":"1995","e":1,"d":""},{"i":781,"t":"Литература: 9-11 класс [Электронный ресурс]","a":"б/а","g":"","c":"9-11","y":"2008","e":1,"d":""},{"i":782,"t":"Литературное чтение","a":"Л. Ф. Климанова, В. Г. Горецкий, Л. А. Виноградская","g":"Учебник","c":"1","y":"2019","e":10,"d":""},{"i":783,"t":"Литературное чтение","a":"Л. Ф. Климанова, В. Г. Горецкий, Л. А. Виноградская","g":"Учебник","c":"1","y":"2019","e":10,"d":""},{"i":784,"t":"Орден Желтого Дятла","a":"Лобату М.","g":"Сказки","c":"","y":"1993","e":1,"d":""},{"i":785,"t":"Орден Желтого Дятла","a":"Лобату М.","g":"Сказки","c":"","y":"1992","e":1,"d":"Монтейру Лобату - знаменитый бразильский писатель и переводчик. Он придумал сказочные приключения девочки Лусии по прозвищу Носишка и её говорящей тряпичной куклы Эмилии. Каждый день Носишка и Эмилия попадают в истории со своими странными и необычными друзьями, каких, наверное, нет ни у кого на свете! В этой книге собраны самые интересные сказки о них. А причем тут Жёлтый Дятел, и какой у него орден? Ищите ответы на эти вопросы на страницах книги, которую очень любят уже несколько поколений детей и их родителей."},{"i":786,"t":"(1920-?). \"Тесный круг друзей моих\". Пушкин и декабристы","a":"Лобикова Н.М.","g":"Учебное пособие","c":"","y":"1980","e":1,"d":"В книге ярко и увлекательно рассказано о друзьях Пушкина, героях Отечественной войны 1812 г. и декабристах, об их образах в творчестве поэта. В ней раскрываются высокие гражданские, нравственные идеалы Пушкина и его близких друзей."},{"i":787,"t":"Тысяча проблемных задач по математике","a":"Лоповок Л.М.","g":"","c":"","y":"1995","e":1,"d":"Сборник содержит задачи проблемного характера по разделам \"Алгебра\", \"Планиметрия\", \"Стереометрия\", \"Тригонометрия\" школьного курса математики."},{"i":788,"t":"Квадрат из поклонников","a":"Лубенец С.А.","g":"Повесть","c":"","y":"2004","e":1,"d":"Весь класс стоит на ушах! Ну и страсти разгорелись вокруг тихой и странной Марины! Еще бы - в нее влюбились сразу четыре парня! А она, всю жизнь опекающая несчастных, подбирающая бездомных кошек, и здесь не изменила себе: выбрала объектом обожания Богдана - всегда плохо одетого и нечесанного сына уборщицы... Мальчишке от счастья тут же \"сорвало крышу\". И вместо того чтобы всем на зависть гулять с необыкновенно популярной Мариной, он переметнулся... к другой девчонке! Страсти закипели не на шутку. А тут еще так сложилось, что все четверо влюбленных были вынуждены вслух , перед всем классом, признаться в своих чувствах к марине, которая все еще переживала предательство Богдана, жалела его, но простить уже не могла... Так кого же ей выбрать? К кому лежит ее сердце, а не жалостливая душа?"},{"i":789,"t":"Золотая девочка","a":"Лубенец С.","g":"Повесть","c":"","y":"2008","e":1,"d":""},{"i":790,"t":"Азирис Нуна, или Сегодня, мама!","a":"Лукьяненко С.В.","g":"Повесть","c":"","y":"2006","e":1,"d":""},{"i":791,"t":"Школьный Надзор","a":"Лукьяненко С.В.","g":"Роман","c":"","y":"2014","e":1,"d":"История Ночного и Дневного Дозоров началась не в конце двадцатого века, а гораздо раньше. И противоборство Светлых и Темных происходит не только в России. И именно об этом расскажут книги нового цикла \"Дозоры\", которые написаны (и пишутся) самыми талантливыми из молодых фантастов России. В написании первых трех книг я участвовал и сам. И мне очень приятно, что в этой \"игре Дозоров\" я был больше в роли \"тренера\", пусть и \"играющего\" - идеи книг и большая часть труда принадлежит авторам, чьи имена я советую запомнить всем любителям фантастики. Я признателен Аркадию Шушпанову, Алексу де Клемешье, Ивану Кузнецову за энтузиазм и любовь к миру \"Дозоров\", глубокое знание этого мира, писательское мастерство и умение играть и на Темной, и на Светлой стороне, которое они показали. (Скажу вам по секрету - у них есть и свои увлекательные миры, с которыми вам еще предстоит познакомиться)."},{"i":792,"t":"Мудреная мозаика","a":"Любимов Ю.Ю.","g":"","c":"","y":"2013","e":1,"d":""},{"i":793,"t":"Любимые русские народные сказки","a":"художник С. Шульга","g":"Сказки","c":"","y":"2008","e":1,"d":""},{"i":794,"t":"Физическая культура","a":"Лях В.И.","g":"Учебник","c":"","y":"2019","e":1,"d":""},{"i":795,"t":"Физическая культура","a":"Лях В.И.","g":"Учебник","c":"","y":"2019","e":3,"d":""},{"i":796,"t":"Сумерки","a":"Майер С.","g":"Роман","c":"","y":"2008","e":1,"d":"Вампирский роман, первое издание которого только в США разошлось рекордным тиражом в 100000 экземпляров! Книга, которая стала культовой для молодежи не только англоязычных стран, но и Франции, Испании, Скандинавии, Японии и Китая. Литературный дебют, который критики сравнивают и \"Интервью с вампиром\" Энн Райс и \"Теми, кто охотится в ночи\" Барбары Хэмбли. Влюбиться в вампира... Это страшно? Это романтично… Это прекрасно и мучительно... Но это не может кончиться добром - особенно в вечном противостоянии вампирских кланов, где малейшее отличие от окружающих уже превращает вас во врага..."},{"i":797,"t":"Средние века","a":"Макдональд Ф.","g":"","c":"","y":"1994","e":1,"d":"Четвертый том \"Всемирной истории в иллюстрациях\" называется \"Средние века\" и охватывает период от походов норманнов до путешествий Колумба. Красочные иллюстрации, играющие в книге равноценную роль с текстом, понравятся детям и помогут им легко усвоить прочитанное. Книга написана простым языком, снабжена картами, хронологическими таблицами, толковым словарем, указателем предметов и имен и списком литературы для дальнейшего чтения. Для детей младшего и среднего школьного возраста."},{"i":798,"t":"Географическая картина мира","a":"Максаковский В.П.","g":"","c":"","y":"2004","e":1,"d":""},{"i":799,"t":"Географическая картина мира","a":"Максаковский В.П.","g":"","c":"","y":"2003","e":1,"d":""},{"i":800,"t":"За страницами учебника географии","a":"Максимов Н.А.","g":"Учебник","c":"5","y":"1988","e":1,"d":""},{"i":801,"t":"В. Клубок, Крючок и Спицы в гостях у малышей","a":"Максимова М.","g":"","c":"","y":"1994","e":1,"d":""},{"i":802,"t":"Все о подводном мире","a":"Малов В.И.","g":"","c":"","y":"2000","e":1,"d":""},{"i":803,"t":"Я познаю мир","a":"Малов В.И.","g":"","c":"","y":"2004","e":1,"d":""},{"i":804,"t":"Я познаю мир","a":"Малов В.И.","g":"Рассказы","c":"","y":"2001","e":1,"d":"Читателя ждет увлекательный рассказ о том, как зарождались современные виды спорта, об истории Олимпийских игр, о самых разнообразных спортивных играх нашего времени. Рассказывается и о самом популярном из технических видов спорта - современных гонках \"Формула-1\""},{"i":805,"t":"Малый атлас мира","a":"старший редактор Н. М. Терехов","g":"Атлас","c":"","y":"1980","e":1,"d":""},{"i":806,"t":"С. Кто живет и что растет в пустыне","a":"Мальт В.","g":"","c":"","y":"2001","e":1,"d":"Какая пустыня самая жаркая в мире? Где находится \"Долина смерти\"? Кто такой \"человек из кустарника\" и где он живет? Ответы вы найдете в этой яркой, красочной книге"},{"i":807,"t":"Мама для Мамонтенка","a":"худож. В. Назарчук","g":"Сказки","c":"","y":"2011","e":1,"d":""},{"i":808,"t":"Мамин-Сибиряк, Дмитрий Наркисович. Аленушкины сказки","a":"Худож. А. Сичкарь","g":"Сказки","c":"","y":"2005","e":1,"d":""},{"i":809,"t":"Мамин-Сибиряк, Дмитрий Наркисович. Аленушкины сказки","a":"Д. Н. Мамин-Сибиряк","g":"Сказки","c":"","y":"1974","e":1,"d":"«Аленушкины сказки» Мамина-Сибиряка - это книга из золотого фонда детской литературы. В этот сборник вошли сказки, которые писатель рассказывал своей маленькой дочке Аленушке. В них яркие краски солнечного дня, красота щедрой русской природы. Вместе с Аленушкой вы попадете в волшебную страну, где оживают игрушки и разговаривают растения, а обыкновенные комары могут одолеть огромного медведя."},{"i":810,"t":"Мамин-Сибиряк, Дмитрий Наркисович. Аленушкины сказки","a":"Дмитрий Мамин-Сибиряк","g":"Сказки","c":"","y":"2012","e":1,"d":""},{"i":811,"t":"Эпоха открытий","a":"Мартелл Х.М.","g":"","c":"","y":"1994","e":1,"d":""},{"i":812,"t":"Ч рь обо всем на свете больше любого специалиста, а умеет такое, такое..."},{"i":842,"t":"Марсельская авантюра","a":"Мейл П.","g":"Роман","c":"","y":"2013","e":1,"d":"Как заработать миллион? Очень просто. Надо всего-то подружиться с миллиардером и помочь ему приобрести с выгодой какую-нибудь жемчужину в южной части \"щедро политого вином и зацелованного солнцем\" Прованса, на Лазурном берегу Франции - бухту Грешников, например. Единственное, что нужно помнить при этом: ваша помощь вполне может обернуться гибелью - не для миллиардера, для вас. Потому что не один ваш богатый друг нацелился на выгодное приобретение. Но ведь кто не рискует, тот никогда не заработает миллион, правда? Вот и Сэм Левитт, главный герой романа, думает точно так же"},{"i":843,"t":"Голубые люди Розовой земли","a":"Мелентьев В.Г.","g":"Повесть","c":"","y":"1994","e":1,"d":""},{"i":844,"t":"Литература","a":"Меркин Г.С.","g":"Учебник","c":"5","y":"2019","e":4,"d":""},{"i":845,"t":"Литература","a":"Меркин Г.С.","g":"Учебник","c":"6","y":"2019","e":4,"d":""},{"i":846,"t":"Литература","a":"Меркин Г.С.","g":"Учебник","c":"5","y":"2019","e":4,"d":""},{"i":847,"t":"Тропический лес","a":"Мертини А.","g":"","c":"","y":"1998","e":1,"d":"Что такое тропический дождевой лес? Почему растения борются за свет? Чем кормятся животные в тропическом лесу? Кто обитает в лесах Мадагаскара? Как в дождевом лесу живут люди? Почему тропический дождевой лес называют \"аптекой\"? В этой книге вы найдете ответы на эти и многие другие вопросы."},{"i":848,"t":"Месть роботов","a":"Сост. М. С. Махмансон","g":"","c":"","y":"1992","e":1,"d":""},{"i":849,"t":"Синяя птица","a":"Метерлинк М.","g":"Хрестоматия","c":"","y":"2008","e":1,"d":""},{"i":850,"t":"Синяя птица","a":"Метерлинк М.","g":"Сказки","c":"","y":"1989","e":1,"d":"В канун Рождества брата и сестру посещает Фея Берилюна. Внучка Феи больна и спасти её может только Синяя птица. Берилюна преподносит детям чудесный подарок, благодаря которому можно видеть скрытую сущность вещей. Неживые предметы - Часы, Огонь, Вода, Хлеб преображаются в живых существ со своим характером. Вместе с детьми они отправляются в опасный путь за Синей птицей."},{"i":851,"t":"История. Древний мир","a":"Миллард Э.","g":"Учебное пособие","c":"","y":"1998","e":1,"d":""},{"i":852,"t":"Чашка по-английски","a":"Миллиган С.","g":"","c":"","y":"1994","e":1,"d":""},{"i":853,"t":"Мир вверх тормашками","a":"худож. В. Чугуевский","g":"","c":"","y":"2004","e":2,"d":""},{"i":854,"t":"Мир вокруг тебя","a":"Худож. С. Брендон","g":"","c":"","y":"1998","e":1,"d":""},{"i":855,"t":"Маленькая злая книга. Специальное издание. Читай с друзьями!","a":"Мист М.","g":"","c":"","y":"2022","e":1,"d":"Такого ещё не было! Маленькая злая книга вернулась с невероятной новостью: она научилась исполнять желания! Правда, для этого ей необходима помощь любимого читателя. Магия подействует только в том случае, если он сможет собрать пятерых друзей (братья, сёстры и даже бабушки тоже подойдут) и пройти вместе с ними новый запутанный квест. Вот только кажется, Маленькая злая книга что-то скрывает… Неужели она снова приготовила какую-то ловушку? Впрочем, не может такого быть! Ведь все знают: эта книга – просто милашка! Бестселлер по версии престижного журнала Spiegel. \"Это издание развлекает, удивляет, дарит сильные эмоции и избавляет от страха перед книгами\". boys & books 5 причин купить эту книгу: 1. Такого ещё не было! Специальное издание супербестселлера \"Маленькая злая книга\" - это новый квест для ДРУЗЕЙ! 2. Эту книгу могут прочесть сразу шестеро людей: читатель и пять его друзей (родители, сёстры и братья, бабушки и дедушки, конечно, тоже считаются). 3. Книга о настоящей дружбе, с которой никогда не будет скучно. Чтобы убедиться в этом, достаточно взглянуть на классные цветные иллюстрации! 4. \"Маленькая злая книга\" помогает детям поверить в себя и влюбляет в чтение. Проверено родителями из 11 стран! 5. Бестселлер престижного немецкого журнала Spiegel."},{"i":856,"t":"Шестой-неполный","a":"Митяев А.В.","g":"Рассказы","c":"","y":"1987","e":1,"d":"В книгу вошли рассказы известного детского писателя о героизме русских солдат в годы Великой Отечественной войны."},{"i":857,"t":"Мифы мира","a":"ред. группа: М. Аксенова","g":"Энциклопедия","c":"","y":"2006","e":1,"d":""},{"i":858,"t":"Е. Птицы мира","a":"Михайлов К.","g":"Энциклопедия","c":"","y":"2006","e":2,"d":""},{"i":859,"t":"В. А что у вас?","a":"Михалков С.","g":"","c":"","y":"2007","e":1,"d":""},{"i":860,"t":"Веселый день","a":"Михалков С.В.","g":"Поэзия","c":"","y":"1984","e":1,"d":""},{"i":861,"t":"Дядя Степа и другие","a":"Михалков С.В.","g":"Поэзия","c":"","y":"1994","e":1,"d":"В книге собраны знаменитые стихи Сергея Михалкова про дядю Степу, а также известные с детства стихотворения - \"Трезор\", \"Прививка\", \"Тридцать шесть и пять\". Книга прекрасно иллюстрирована художником Владимиром Суриковым."},{"i":862,"t":"Мы едем, едем, едем...","a":"Михалков С.В.","g":"","c":"","y":"1997","e":1,"d":""},{"i":863,"t":"Праздник непослушания","a":"Михалков С.В.","g":"","c":"","y":"2016","e":1,"d":""},{"i":864,"t":"Стихи - детям!","a":"Михалков С.В.","g":"Поэзия","c":"","y":"2017","e":1,"d":"С.В. Михалков, поэт небывалой высоты, создавший всем известного героя дядю Стёпу, сумел, даже будучи взрослым, сохранить в себе того самого мальчишку, который в обыденном заметит необычное, который радуется жизни, спешит больше узнать и, конечно, найти друзей, чтобы весело провести время! В нашей книге собраны как раз такие, жизнерадостные и интересные стихи про детей и зверей: «Сладкоежки», «Мальчик с девочкой дружил…», «Лифт и Карандаш», «Лесная академия», «От кареты до ракеты» с рисунками В. Чижикова, Г. Мазурина, Л. Токмакова, Ф. Лемкуля, О. Ионайтис и многих других известных иллюстраторов."},{"i":865,"t":"Русская мысль и речь","a":"Михельсон М.И.","g":"","c":"","y":"1994","e":1,"d":""},{"i":866,"t":"Русская мысль и речь","a":"Михельсон М.И.","g":"","c":"","y":"1994","e":1,"d":""},{"i":867,"t":"Мишки-Гамми и Принц-Дра чительном этапе Великой Отечественной войны"},{"i":1040,"t":"Девятнадцатый век","a":"Поллард М.","g":"","c":"","y":"1994","e":1,"d":"Седьмой том детской \"Всемирной истории в иллюстрациях\" охватывает период, начавшийся с Великой французской революции и продолжавшийся вплоть до нефтяной эры"},{"i":1041,"t":"Полная библиотека внеклассного чтения","a":"составители: Е. Позина, Т. Давыдова","g":"","c":"1","y":"2019","e":1,"d":"В этой книге собраны все произведения, предусмотренные для внеклассного чтения в первом классе. Это поистине полная библиотека внеклассного чтения."},{"i":1042,"t":"Полная хрестоматия для начальной школы. 2 класс","a":"сост. Н.В. Белов","g":"Хрестоматия","c":"2","y":"2010","e":2,"d":""},{"i":1043,"t":"Полная хрестоматия для начальной школы","a":"составитель Е. В. Посашкова","g":"Хрестоматия","c":"","y":"","e":1,"d":""},{"i":1044,"t":"Полная хрестоматия для начальной школы","a":"составитель Е. В. Посашкова","g":"Хрестоматия","c":"","y":"2012","e":1,"d":""},{"i":1045,"t":"Полная энциклопедия народной медицины","a":"составитель А. В. Маркова","g":"Энциклопедия","c":"","y":"2002","e":1,"d":"В книге собраны все известные рецепты народной медицины и знахарские приемы, проверенные многовековой лечебной практикой. В алфавитном порядке описаны причины возникновения и симптомы более 200 заболеваний и перечислены основные методы их лечения. Пользуясь самыми доступными средствами, вы сможете избавить себя и своих близких от различных недугов и изнурительных болей. Вы научитесь обходится без дорогих и небезвредных лекарств, используя приготовленные своими руками эффективные препараты из лекарственных растений, меда и продуктов питания. Народная мудрость и целительные силы Природы помогут вам вернуть утраченное здоровье и обрести жизенную энергию. Книга рассчитана на тех, кто дорожит своим здоровьем, думает о будущем и ценит здравый смысл."},{"i":1046,"t":"Информатика","a":"Поляков К.Ю.","g":"","c":"10","y":"2019","e":57,"d":""},{"i":1047,"t":"Информатика","a": ебенку весело и с пользой провести время. Играя, он улучшит навыки логического мышления, координацию движений и глазомер"},{"i":1086,"t":"Мой звездный час","a":"Райбан Х.","g":"","c":"","y":"2002","e":1,"d":"Он был самым обычным парнем, пока его не посетила странная мысль: \"Я на обложке модного журнала? Можно попробовать\""},{"i":1087,"t":"Убийства в кукольном домике","a":"Райт Б.Р.","g":"","c":"","y":"2020","e":1,"d":"Книга \"Убийства в кукольном домике\" была экранизирована! Эми решает пожить некоторое время у своей тёти Клэр, в ее мрачном загородном доме. На захламленном чердаке Эми находит кукольный домик - точную копию дома тети Клэр. И куклы в нем настолько реалистичны, что становится жутко… Но по-настоящему Эми испугается, когда куклы в кукольном домике начнут двигаться, плакать и даже кричать! Что происходит?! Кто знает, может быть, куклы пытаются что-то сказать Эми? Вдруг это связано с жестоким убийством ее прадедушки и прабабушки, случившимся много лет назад…"},{"i":1088,"t":"Пирамиды","a":"Райхард Г.","g":"","c":"","y":"","e":2,"d":""},{"i":1089,"t":"Древние греки","a":"Райхардт Г.","g":"","c":"","y":"1994","e":2,"d":""},{"i":1090,"t":"Семь чудес света","a":"Райхардт Г.","g":"Энциклопедия","c":"","y":"1994","e":1,"d":"Книга из серии \"Что есть что\" посвящена истории семи чудес света"},{"i":1091,"t":"Стихийные бедствия","a":"Райхардт Г.","g":"Поэзия","c":"","y":"1994","e":3,"d":"В издании рассказывается о величайших катастрофах в истории человечества: вулканических извержениях, землетрясениях, ураганах, штормах, засухах, принесших разрушения и смерть. Книга дополнена кратким рассказом доктора геолого-минералогических наук, профессора МГУ Н.А.Ясаманова о стихийных бедствиях, происходивших на территории стран СНГ. Издание содержит богатый иллюстративный материал."},{"i":1092,"t":"Приключения барона Мюнхгаузена","a":"Распе Р.Э.","g":"","c":"","y":"2007","e":1,"d":""},{"i":1093,"t":"Занимательный Мюнхаузен. Пособие для начинающих баронов в пересказе К. Чуковского, с иллюстрациями, дополнениями и комментариями Н. Воронцова","a":"Распэ Р.Э.","g":"Учебное пособие","c":"","y":"2004","e":1,"d":""},{"i":1094,"t":"Вечер неудач","a":"Рассел Р.Р.","g":"Повесть","c":"","y":"2016","e":1,"d":"Сколько дел за раз можно сделать? Вот я должна развлекать детишек на празднике в костюме крысы, танцевать на школьной вечеринке с подругами в костюме из мешка для мусора и тусоваться там же с Брендоном в шикарном платье. И все это - одновременно! И Маккензи Холлистер под ногами путается, куда ж без нее… Вторая книга серии, которая заслуженно стала популярной по всему миру! Издания выходили не только в США и Европе, но и в Бразилии и Корее! Полная юмора и изумительных картинок в манга-стиле история о Никки Максвелл, решающей стандартные для девочек вопросы: как понравиться мальчику и как понять, что ты ему нравишься, как поладить с родителями и вреднючей сестрой, как завести подруг в новой школе и на какие подвиги придется идти ради этой дружбы. А еще у главной героини есть коварная противница - Маккензи Холлистер, которая неизменно подстраивает всякие пакости!"},{"i":1095,"t":"Ледовое позорище","a":"Рассел Р.Р.","g":"Повесть","c":"","y":"2016","e":1,"d":"Теперь и мне приходится проверить, на что я готова ради подруг. Они решили принять участие в благотворительном ледовом шоу, а я... Ну, на коньках стояла. В третьем классе. Один раз. Конечно, упорные тренировки мне помогут, только вот не стоит забывать про Маккензи Холлистер. Она как всегда - вредит и пакостит. Так что если я не стану великой фигуристкой по волшебству за одну ночь, то придется придумать что-нибудь еще!"},{"i":1096,"t":"Рассказы о животных","a":"художник Владимир Черноглазов","g":"Рассказы","c":"","y":"2007","e":1,"d":"В книгу вошли забавные и поучительные рассказы о животных российских писателей - натуралистов В. Бианки, Н. Сладкова, М. Пришвина, Г. Скребицкого. Яркие, цветные иллюстрации."},{"i":1097,"t":"Муфта, Полботинка и Моховая Борода","a":"Рауд Э.","g":"Повесть","c":"",
